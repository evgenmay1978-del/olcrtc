name: Build Android App (debug APK)

# Builds the vendored maestrovpn client (app/) into a debug APK, compiling the
# olcrtc Go sources from this repo root into the Android AAR via gomobile.
# Runs on changes under app/ or mobile/ so Kotlin/binding changes are verified.
# The artifact is an unsigned debug APK for testing (no signing secrets needed).

on:
  push:
    branches: ["main", "master"]
    paths:
      - "app/**"
      - "mobile/**"
      - "internal/**"
      - "third_party/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/android-app.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "app/**"
      - "mobile/**"
      - "internal/**"
      - "third_party/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        # Mirror the upstream maestrovpn CI: install the SDK platform, build-tools,
        # and NDK that are known to build this project. The compileSdk (37)
        # platform is auto-provisioned by the Android Gradle Plugin.
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install gomobile
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Initialize gomobile
        run: |
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          gomobile init

      - name: Build debug APK
        working-directory: app
        run: |
          export OLCRTC_REPO="${{ github.workspace }}"
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          ./gradlew \
            -Pmaestrovpn.version="0.0.0-ci" \
            -Pmaestrovpn.versionCode="1" \
            -Pmaestrovpn.android.abiFilters=armeabi-v7a \
            :sharedUI:jvmTest :androidApp:assembleDebug --stacktrace

      - name: Collect APK
        working-directory: app
        run: |
          mkdir -p dist
          apk="$(find androidApp/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [ -z "$apk" ]; then
            echo "debug APK not found" >&2
            exit 1
          fi
          cp "$apk" "dist/maestrovpn-debug.apk"

      - name: Upload APK artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: maestrovpn-debug-apk
          path: app/dist/maestrovpn-debug.apk
          retention-days: 7

      # Publish the APK as a Release asset on pushes to the default branch.
      # Release assets are not subject to the Actions artifact storage quota,
      # so this gives a stable URL to install on a phone or Android TV even
      # when the artifact upload above is skipped because the quota is full.
      - name: Publish APK to "android-latest" release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest debug APK
          body: |
            Unsigned debug APK built from ${{ github.sha }}.
            Install on a phone or Android TV (enable "unknown sources").
          prerelease: true
          files: app/dist/maestrovpn-debug.apk
