# Web panel for managing client access (create / set days / disable / rotate /
# delete). Runs the olcrtc-panel binary from the same image as the server and
# shares the same client registry volume, so changes apply without a restart.
#
# Security: the panel is published ONLY on the host loopback (127.0.0.1:8090),
# never on a public interface. Reach it over an SSH tunnel:
#
#   ssh -L 8090:127.0.0.1:8090 root@YOUR_SERVER
#   # then open http://127.0.0.1:8090  (user: admin)
#
# Start it (after the server image is built):
#
#   OLCRTC_PANEL_PASSWORD='strong-password' \
#     docker compose -f docker-compose.server.yml -f docker-compose.panel.yml up -d
#
# It reuses the olcrtc-state volume from docker-compose.server.yml, so the panel
# edits the very same clients.json the server reads.

services:
  olcrtc-panel:
    image: olcrtc/server:local
    build:
      context: .
    container_name: olcrtc-panel
    restart: unless-stopped
    # Bind to host loopback only. Do NOT change to 0.0.0.0 — that would expose
    # the panel to the internet. Use the SSH tunnel above instead.
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      # Required: the panel refuses to start without a password.
      OLCRTC_PANEL_PASSWORD: "${OLCRTC_PANEL_PASSWORD:?set OLCRTC_PANEL_PASSWORD to a strong password}"
      # Optional: defaults to "admin".
      OLCRTC_PANEL_USER: "${OLCRTC_PANEL_USER:-admin}"
      # Payment flow (for the in-app signup API). Shown to clients on signup.
      OLCRTC_PAY_INFO: "${OLCRTC_PAY_INFO:-}"
      # Telegram notifications for "I paid" claims (optional). Without these the
      # claim still appears as a pending client in the panel.
      OLCRTC_TELEGRAM_TOKEN: "${OLCRTC_TELEGRAM_TOKEN:-}"
      OLCRTC_TELEGRAM_CHAT_ID: "${OLCRTC_TELEGRAM_CHAT_ID:-}"
    entrypoint: ["/usr/local/bin/olcrtc-panel"]
    command:
      - "-registry"
      - "/var/lib/olcrtc/clients.json"
      - "-server"
      - "/var/lib/olcrtc/server.generated.yaml"
      - "-addr"
      - "0.0.0.0:8090"
    volumes:
      - olcrtc-state:/var/lib/olcrtc
    init: true
    # The image's HEALTHCHECK pidof-checks the `olcrtc` server process, which
    # does not run in the panel container, so it would always report unhealthy.
    # Disable it here; the panel's liveness is its HTTP endpoint.
    healthcheck:
      disable: true

volumes:
  olcrtc-state:
